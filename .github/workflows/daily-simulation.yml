name: APEX TRADE LAB Daily Run

on:
  schedule:
    - cron: '30 21 * * 1-5'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  simulate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install -r requirements.txt
      - run: python main.py
      - run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add outputs/ -f
          git diff --staged --quiet || git commit -m "APEX update $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push
